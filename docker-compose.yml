# =============================================================================
# ProtePilot — docker-compose.yml
# Enterprise Biotech Digital Twin Platform (M1–M23)
# =============================================================================
# Usage:
#   docker compose up -d          # Start in background
#   docker compose up --build     # Rebuild and start
#   docker compose down           # Stop all services
#   docker compose logs -f app    # Follow application logs
# =============================================================================

version: "3.9"

services:
  # ---------- Main Application -------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protepilot-ai
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      # Persist trained models and workspaces across container restarts
      - protepilot-models:/app/data/models
      - protepilot-workspaces:/app/data/workspaces
      - protepilot-reports:/app/data/reports
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=50
      - STREAMLIT_THEME_BASE=light
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"

  # ---------- Future: Redis Cache (uncomment when needed) ----------------
