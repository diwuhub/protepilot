<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 520" role="img" aria-labelledby="title desc">
  <title id="title">ProtePilot deployment architecture</title>
  <desc id="desc">Candidate inputs flow through validation, molecule classification, feature extraction, developability scoring, optional ML, digital twins, risk synthesis, reports, and Streamlit dashboard.</desc>
  <defs>
    <style>
      .bg { fill: #f7f2e8; }
      .box { fill: #fffdf7; stroke: #294d52; stroke-width: 2; rx: 18; }
      .box2 { fill: #edf5f2; stroke: #294d52; stroke-width: 2; rx: 18; }
      .text { fill: #182327; font: 600 20px Arial, sans-serif; }
      .small { fill: #526267; font: 16px Arial, sans-serif; }
      .label { fill: #1d5960; font: 700 15px Arial, sans-serif; letter-spacing: 1px; }
      .arrow { stroke: #294d52; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7d8f92; stroke-width: 3; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294d52"/>
    </marker>
  </defs>
  <rect class="bg" width="1320" height="520"/>
  <text x="60" y="54" class="label">PROTEPILOT</text>
  <text x="60" y="88" class="text" style="font-size:30px">Developability decision orchestration</text>
  <text x="60" y="118" class="small">Decision support for expert review, not autonomous CMC governance.</text>

  <rect class="box" x="60" y="170" width="170" height="110"/>
  <text x="88" y="214" class="text">Candidate</text>
  <text x="88" y="240" class="small">sequence / CSV</text>

  <rect class="box" x="280" y="170" width="170" height="110"/>
  <text x="306" y="206" class="text">Validation</text>
  <text x="306" y="232" class="small">schema, format,</text>
  <text x="306" y="254" class="small">OOD checks</text>

  <rect class="box" x="500" y="170" width="190" height="110"/>
  <text x="528" y="206" class="text">Classifier</text>
  <text x="528" y="232" class="small">10 molecule</text>
  <text x="528" y="254" class="small">formats</text>

  <rect class="box" x="740" y="170" width="200" height="110"/>
  <text x="770" y="206" class="text">Feature Layer</text>
  <text x="770" y="232" class="small">sequence, charge,</text>
  <text x="770" y="254" class="small">CDR, PTM, risk</text>

  <rect class="box2" x="990" y="120" width="250" height="110"/>
  <text x="1022" y="156" class="text">Developability</text>
  <text x="1022" y="182" class="small">aggregation, stability,</text>
  <text x="1022" y="204" class="small">immunogenicity, COGS</text>

  <rect class="box2" x="990" y="290" width="250" height="110"/>
  <text x="1022" y="326" class="text">Optional ML</text>
  <text x="1022" y="352" class="small">ESM-2, XGBoost,</text>
  <text x="1022" y="374" class="small">SHAP, uncertainty</text>

  <rect class="box" x="500" y="350" width="200" height="90"/>
  <text x="530" y="388" class="text">Digital Twins</text>
  <text x="530" y="414" class="small">formulation, QC, DoE</text>

  <rect class="box" x="740" y="350" width="200" height="90"/>
  <text x="770" y="388" class="text">Risk Synthesis</text>
  <text x="770" y="414" class="small">scores + confidence</text>

  <rect class="box" x="60" y="350" width="170" height="90"/>
  <text x="90" y="388" class="text">Reports</text>
  <text x="90" y="414" class="small">DOCX / PDF / CSV</text>

  <rect class="box" x="280" y="350" width="170" height="90"/>
  <text x="306" y="388" class="text">Dashboard</text>
  <text x="306" y="414" class="small">Streamlit review</text>

  <path class="arrow" d="M230 225 H280"/>
  <path class="arrow" d="M450 225 H500"/>
  <path class="arrow" d="M690 225 H740"/>
  <path class="arrow" d="M940 210 C960 190 970 178 990 176"/>
  <path class="dash" d="M940 240 C965 276 970 326 990 344"/>
  <path class="arrow" d="M1115 230 C1115 262 1115 260 1115 290"/>
  <path class="arrow" d="M990 345 H940"/>
  <path class="arrow" d="M700 395 H740"/>
  <path class="arrow" d="M740 395 H450"/>
  <path class="arrow" d="M740 395 C560 470 250 470 230 415"/>
</svg>
