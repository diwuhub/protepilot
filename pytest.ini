[pytest]
testpaths = tests SelfTest
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ═══════════════════════════════════════════════════════════════════════
#  Four-Layer Test Architecture
# ═══════════════════════════════════════════════════════════════════════
#
#  Layer 1 — CORE:        pytest -m core          (single-molecule pipeline)
#  Layer 2 — GOVERNANCE:  pytest -m governance     (grade, schema, determinism)
#  Layer 3 — BULK:        pytest -m bulk           (CSV, isolation, alignment)
#  Layer 4 — TRAINING:    pytest -m ml             (requires torch + sklearn)
#
#  Combinations:
#    pytest -m "core or governance"    # full quality sweep (Layer 1 env)
#    pytest -m "core or bulk"          # pipeline + batch (Layer 1 env)
#    pytest -m "not ml"                # everything except training
#    pytest                            # all tests (default)
# ═══════════════════════════════════════════════════════════════════════

markers =
    core: Layer 1 — Core runtime tests (no torch/sklearn/streamlit required)
    governance: Layer 2 — Grade canonicality, determinism, schema alignment, evidence completeness
    bulk: Layer 3 — Bulk analysis pipeline (CSV parse, row isolation, bulk-vs-single parity)
    ml: Layer 4 — ML/training tests (requires torch, sklearn)
    integration: End-to-end tests (requires full environment including streamlit)
    slow: Tests taking > 10 seconds

addopts = -v --tb=short

# Ignore heavy ML modules if torch not installed
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:torch.*
